services:
  - type: web
    name: moneypal-backend
    runtime: docker
    # Tell Render where to find the Dockerfile and what to use as the build context.
    # Both paths are relative to the repo root.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moneypal-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      # Set this to your Vercel frontend URL after first deploy, e.g.:
      # https://moneypal.vercel.app
      # Comma-separate multiple origins if needed.
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: moneypal-db
    databaseName: moneypal
    user: moneypal
    plan: free
