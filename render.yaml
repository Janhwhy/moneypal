services:
  - type: web
    name: moneypal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Runs DB migrations before starting the server on every deploy.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moneypal-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Set this to your Vercel frontend URL after first deploy, e.g.:
      # https://moneypal.vercel.app
      # Comma-separate multiple origins if needed.
      - key: ALLOWED_ORIGINS
        sync: false

databases:
  - name: moneypal-db
    databaseName: moneypal
    user: moneypal
    plan: free

