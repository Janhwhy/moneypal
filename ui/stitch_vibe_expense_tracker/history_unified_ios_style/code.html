<style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;

        }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(10, 51, 35, 0.1);
        }

<body class="flex flex-col min-h-screen font-sans text-body-lg antialiased overflow-x-hidden selection:bg-[#D0A1BA]/30 selection:text-primary">
<!-- TopAppBar -->
<header class="bg-surface/40 dark:bg-surface-dim/40 backdrop-blur-xl fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-16 border-b border-on-primary-container/10 shadow-sm">
<button aria-label="Profile" class="text-on-surface-variant dark:text-outline hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim tracking-tight">Serene Ledger</h1>
<button aria-label="Notifications" class="text-on-surface-variant dark:text-outline hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-gutter py-xl mt-16 mb-24 max-w-md mx-auto w-full">
<!-- Search/Filter Bar -->
<div class="relative mb-8">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="search">search</span>
</div>
<input aria-label="Search transactions" class="w-full bg-surface-container-highest/50 dark:bg-surface-container-high/50 border-none focus:ring-2 focus:ring-[#D0A1BA] text-on-surface py-2 pl-10 pr-3 rounded-[10px] transition-all font-sans text-body-lg outline-none placeholder:text-outline/70" placeholder="Search" type="text"/>
</div>
<!-- Transaction List -->
<div class="space-y-8">
<!-- Group: Yesterday -->
<section>
<h2 class="font-label-md text-label-md text-on-surface-variant mb-2 px-1 uppercase tracking-wider font-semibold">Yesterday</h2>
<div class="space-y-0 liquid-glass rounded-[16px] overflow-hidden">
<!-- Item 1 -->
<button class="w-full text-left bg-transparent hover:bg-white/40 active:bg-black/5 dark:hover:bg-white/10 dark:active:bg-black/20 p-4 flex items-center gap-4 transition-all group border-b border-surface-variant/30 last:border-none relative overflow-hidden">
<div class="w-10 h-10 rounded-[10px] bg-[#D0A1BA]/20 text-[#D0A1BA] flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="restaurant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-lg text-body-lg font-medium text-on-surface truncate">Dining</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">Dinner at Luiji's</p>
</div>
<div class="shrink-0 text-right">
<p class="font-body-lg text-body-lg font-medium text-on-surface">-₹45.00</p>
</div>
</button>
<!-- Item 2 -->
<button class="w-full text-left bg-transparent hover:bg-white/40 active:bg-black/5 dark:hover:bg-white/10 dark:active:bg-black/20 p-4 flex items-center gap-4 transition-all group border-b border-surface-variant/30 last:border-none relative overflow-hidden">
<div class="w-10 h-10 rounded-[10px] bg-[#D0A1BA]/20 text-[#D0A1BA] flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="local_gas_station" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_gas_station</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-lg text-body-lg font-medium text-on-surface truncate">Transport</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">Shell Station</p>
</div>
<div class="shrink-0 text-right">
<p class="font-body-lg text-body-lg font-medium text-on-surface">-₹32.50</p>
</div>
</button>
</div>
</section>
<!-- Group: July 12 -->
<section>
<h2 class="font-label-md text-label-md text-on-surface-variant mb-2 px-1 uppercase tracking-wider font-semibold">July 12</h2>
<div class="space-y-0 liquid-glass rounded-[16px] overflow-hidden">
<!-- Item 3 -->
<button class="w-full text-left bg-transparent hover:bg-white/40 active:bg-black/5 dark:hover:bg-white/10 dark:active:bg-black/20 p-4 flex items-center gap-4 transition-all group border-b border-surface-variant/30 last:border-none relative overflow-hidden">
<div class="w-10 h-10 rounded-[10px] bg-[#D0A1BA]/20 text-[#D0A1BA] flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="shopping_bag" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-lg text-body-lg font-medium text-on-surface truncate">Groceries</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">Whole Foods Market</p>
</div>
<div class="shrink-0 text-right">
<p class="font-body-lg text-body-lg font-medium text-on-surface">-₹124.90</p>
</div>
</button>
<!-- Item 4 -->
<button class="w-full text-left bg-transparent hover:bg-white/40 active:bg-black/5 dark:hover:bg-white/10 dark:active:bg-black/20 p-4 flex items-center gap-4 transition-all group border-b border-surface-variant/30 last:border-none relative overflow-hidden">
<div class="w-10 h-10 rounded-[10px] bg-primary/10 text-primary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="payments" data-weight="fill" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-lg text-body-lg font-medium text-on-surface truncate">Income</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">Freelance Design</p>
</div>
<div class="shrink-0 text-right">
<p class="font-body-lg text-body-lg font-medium text-primary">+₹850.00</p>
</div>
</button>
<!-- Item 5 -->
<button class="w-full text-left bg-transparent hover:bg-white/40 active:bg-black/5 dark:hover:bg-white/10 dark:active:bg-black/20 p-4 flex items-center gap-4 transition-all group border-b border-surface-variant/30 last:border-none relative overflow-hidden">
<div class="w-10 h-10 rounded-[10px] bg-[#D0A1BA]/20 text-[#D0A1BA] flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[20px]" data-icon="coffee" data-weight="fill" style="font-variation-settings: 'FILL' 1;">coffee</span>
</div>
<div class="flex-1 min-w-0">
<p class="font-body-lg text-body-lg font-medium text-on-surface truncate">Coffee</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">Blue Bottle</p>
</div>
<div class="shrink-0 text-right">
<p class="font-body-lg text-body-lg font-medium text-on-surface">-₹6.50</p>
</div>
</button>
</div>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="liquid-glass rounded-t-3xl border-t border-on-primary-container/10 shadow-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4">
<!-- History (Active) -->
<a aria-current="page" aria-label="History" class="flex flex-col items-center justify-center bg-secondary-container/40 dark:bg-secondary-container/30 text-on-secondary-container dark:text-secondary-fixed-dim rounded-full px-5 py-2 backdrop-blur-md border border-secondary-container/50 shadow-inner active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="history" data-weight="fill" style="font-variation-settings: 'FILL' 1;">history</span>
</a>
<!-- Add Action -->
<a aria-label="Add" class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim px-4 py-1.5 hover:bg-on-surface/5 dark:hover:bg-on-surface-variant/5 rounded-full active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined text-4xl" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</a>
<!-- Analytics (Inactive) -->
<a aria-label="Analytics" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1.5 hover:bg-on-surface/5 dark:hover:bg-on-surface-variant/5 rounded-full active:scale-90 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="equalizer">equalizer</span>
</a>
</nav>
<script>
        // Simple search filter interaction
        const searchInput = document.querySelector('input[type="text"]');
        const transactions = document.querySelectorAll('section button');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            transactions.forEach(btn => {
                const title = btn.querySelector('.text-on-surface.truncate')?.innerText.toLowerCase() || '';
                const subtitle = btn.querySelector('.text-on-surface-variant.truncate')?.innerText.toLowerCase() || '';
                if(title.includes(term) || subtitle.includes(term)) {
                    btn.style.display = 'flex';
                } else {
                    btn.style.display = 'none';
                }
            });
        });
    </script>
</body></html>
