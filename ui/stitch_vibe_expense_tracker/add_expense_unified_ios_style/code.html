<script>
        // Micro-interaction logic for keypad
        document.addEventListener('DOMContentLoaded', () => {
            const display = document.getElementById('amount-display');
            let currentVal = '0.00';
            let isFirstEntry = true;

            const formatCurrency = (val) => {
                if (val === '') return '₹0.00';
                const num = parseFloat(val);
                if (isNaN(num)) return '₹0.00';
                return '₹' + num.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            };

            const updateDisplay = () => {
                // simple visual update for demonstration
                // In a real app, this would handle complex decimal logic
                display.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    display.style.transform = 'scale(1)';
                }, 100);
            };

            const numBtns = document.querySelectorAll('.keypad-btn');
            numBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const digit = e.target.textContent;
                    if (isFirstEntry) {
                        currentVal = digit;
                        isFirstEntry = false;
                    } else {
                        // Very naive formatting for visual effect only
                        if(currentVal.replace('.','').length < 8) {
                             currentVal += digit;
                        }
                    }
                    display.textContent = formatCurrency(currentVal);
                    updateDisplay();
                });
            });

            const delBtn = document.querySelector('.keypad-btn-del');
            if(delBtn) {
                 delBtn.addEventListener('click', () => {
                     if (currentVal.length > 1) {
                         currentVal = currentVal.slice(0, -1);
                     } else {
                         currentVal = '0';
                         isFirstEntry = true;
                     }
                     display.textContent = formatCurrency(currentVal);
                     updateDisplay();
                 });
            }
        });
    </script>
