<style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
            background-color: #f2efd0; /* surface-container */
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
        
        .ios-list-group {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(10, 51, 35, 0.1);
        }
        .dark .ios-list-group {
            background: rgba(20, 31, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .ios-list-item {
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
            background: transparent;
        }
        
        .ios-list-item:last-child {
            border-bottom: none;
        }

        .input-minimal {
            background-color: transparent;
            border: none;
            text-align: right;
            padding-right: 0;
        }

        .input-minimal:focus {
            outline: none;
            box-shadow: none;
        }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(10, 51, 35, 0.1);
        }

            background: rgba(20, 31, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .liquid-btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(10, 51, 35, 0.1);
        }
        .dark .liquid-btn {
            background: rgba(20, 31, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
    </style>

<body class="text-on-surface font-sans antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface/40 dark:bg-surface-dim/40 backdrop-blur-xl fixed top-0 w-full z-50 flex justify-between items-center px-gutter h-16 border-b border-on-primary-container/10 shadow-sm">
<button class="text-on-surface-variant dark:text-outline hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim tracking-tight">Serene Ledger</h1>
<button class="text-on-surface-variant dark:text-outline hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col gap-md px-gutter py-xl mt-16 mb-24 max-w-md mx-auto w-full">
<!-- Header -->
<div class="px-sm pt-sm pb-base">
<h2 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-base">Settings</h2>
<p class="font-body-lg text-on-surface-variant">Manage your financial environment.</p>
</div>
<!-- Budgeting Section -->
<section class="flex flex-col gap-base">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase ml-sm">Budgeting</h3>
<div class="ios-list-group">
<div class="ios-list-item px-md py-sm flex items-center justify-between">
<label class="font-body-lg text-on-surface" for="monthly-budget">Monthly Budget Limit</label>
<div class="flex items-center">
<span class="text-on-surface-variant font-body-lg mr-xs">₹</span>
<input class="input-minimal w-24 font-body-lg text-pantone-686 focus:ring-0 m-0" id="monthly-budget" placeholder="0.00" type="number" value="4500"/>
</div>
</div>
</div>
</section>
<!-- Categories Section -->
<section class="flex flex-col gap-base mt-md">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase ml-sm">Categories</h3>
<div class="ios-list-group">
<!-- Category Item -->
<div class="ios-list-item px-md py-sm flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-pantone-686 flex items-center justify-center opacity-20">
</div>
<span class="font-body-lg text-on-surface">Groceries</span>
</div>
<button aria-label="Delete Groceries" class="p-xs text-pantone-686 hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Category Item -->
<div class="ios-list-item px-md py-sm flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-pantone-686 flex items-center justify-center opacity-20"></div>
<span class="font-body-lg text-on-surface">Dining Out</span>
</div>
<button aria-label="Delete Dining Out" class="p-xs text-pantone-686 hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Category Item -->
<div class="ios-list-item px-md py-sm flex items-center justify-between">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-pantone-686 flex items-center justify-center opacity-20"></div>
<span class="font-body-lg text-on-surface">Utilities</span>
</div>
<button aria-label="Delete Utilities" class="p-xs text-pantone-686 hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<!-- Add New Category Action -->
<button class="ios-list-item w-full px-md py-sm flex items-center gap-sm hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-pantone-686" data-icon="add">add</span>
<span class="font-body-lg text-pantone-686 font-medium">Add New Category</span>
</button>
</div>
</section>
<!-- Data Management Section -->
<section class="flex flex-col gap-base mt-md">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase ml-sm">Data Management</h3>
<button class="liquid-btn w-full text-pantone-686 rounded-xl min-h-[56px] flex items-center justify-center gap-sm hover:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="download">download</span>
<span class="font-body-lg font-semibold">Export to CSV</span>
</button>
<p class="font-body-sm text-on-surface-variant text-center mt-xs opacity-70">Download your complete transaction history.</p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="liquid-glass rounded-t-3xl border-t border-on-primary-container/10 shadow-lg fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4">
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1.5 hover:bg-on-surface/5 dark:hover:bg-on-surface-variant/5 rounded-full active:scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-3xl">history</span>
</button>
<!-- Add Action -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim px-4 py-1.5 hover:bg-on-surface/5 dark:hover:bg-on-surface-variant/5 rounded-full active:scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</button>
<!-- Analytics Action -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline px-4 py-1.5 hover:bg-on-surface/5 dark:hover:bg-on-surface-variant/5 rounded-full active:scale-90 transition-all duration-300 ease-out">
<span class="material-symbols-outlined text-3xl">equalizer</span>
</button>
</nav>
</body></html>
