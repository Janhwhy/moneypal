# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to prepend to the slug in revision filename
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate being used or not
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# prepend_sys_path = false

# version path separator; default is ';'
# version_path_separator = ;

# set to 'true' to search for version files recursively
# recursive_version_locations = false

# output encoding
# output_encoding = utf-8

# sqlalchemy.url is intentionally left as a placeholder.
# The actual URL is read at runtime from the DATABASE_URL environment variable
# in alembic/env.py (via app.config.settings). Do NOT put real credentials here.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
